<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Based | Not Found</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f4f6fb;
        color: #171f30;
        font-family: "Space Grotesk", "Segoe UI", sans-serif;
      }
      .card {
        width: min(92vw, 560px);
        background: #fff;
        border: 1px solid #d9e0ef;
        border-radius: 14px;
        padding: 24px;
      }
      a {
        color: #0b56ff;
        text-decoration: none;
      }
      .links {
        display: flex;
        gap: 14px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Page not found</h1>
      <p>The path you requested does not exist in the Based website.</p>
      <div class="links">
        <a href="/">Home</a>
        <a href="/docs/">Docs</a>
        <a href="/playground/">Playground</a>
      </div>
    </main>
  </body>
</html>
